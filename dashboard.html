<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launch27 Booking Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .nav-links {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        a {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
        }
        
        a:hover {
            background: #5568d3;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .stat {
            text-align: center;
            padding: 20px;
        }
        
        .stat-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: #999;
            font-size: 14px;
        }
        
        .section {
            background: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .list-item {
            padding: 12px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }
        
        .list-item:last-child {
            border-bottom: none;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge-success {
            background: #d4edda;
            color: #155724;
        }
        
        .badge-error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .badge-info {
            background: #d1ecf1;
            color: #0c5460;
        }
        
        .empty {
            text-align: center;
            color: #999;
            padding: 20px;
        }
        
        .refresh {
            text-align: center;
            margin-top: 20px;
        }
        
        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        
        button:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Launch27 Booking Dashboard</h1>
            <p style="color: #666; margin-top: 5px;">Real-time monitoring and analytics</p>
            <div class="nav-links">
                <a href="/">🏠 Booking Form</a>
                <a href="/logs.php">📋 View Logs</a>
            </div>
        </header>
        
        <div class="grid">
            <div class="card stat">
                <div class="stat-icon">📅</div>
                <div class="stat-number" id="total-bookings">0</div>
                <div class="stat-label">Total Bookings</div>
            </div>
            
            <div class="card stat">
                <div class="stat-icon">✅</div>
                <div class="stat-number" id="successful-bookings">0</div>
                <div class="stat-label">Successful</div>
            </div>
            
            <div class="card stat">
                <div class="stat-icon">⚠️</div>
                <div class="stat-number" id="failed-bookings">0</div>
                <div class="stat-label">Failed</div>
            </div>
            
            <div class="card stat">
                <div class="stat-icon">📡</div>
                <div class="stat-number" id="api-calls">0</div>
                <div class="stat-label">API Calls</div>
            </div>
        </div>
        
        <div class="section">
            <h2>📋 Recent Events</h2>
            <div id="recent-events">
                <div class="empty">Loading events...</div>
            </div>
        </div>
        
        <div class="section">
            <h2>📊 Daily Stats</h2>
            <div id="daily-stats">
                <div class="empty">Loading stats...</div>
            </div>
        </div>
        
        <div class="refresh">
            <button onclick="refreshData()">🔄 Refresh Data</button>
            <p style="color: #999; margin-top: 10px; font-size: 12px;">
                Auto-refreshes every 30 seconds
            </p>
        </div>
    </div>
    
    <script>
        async function loadData() {
            try {
                const res = await fetch('/api.php?action=logs&limit=200');
                const data = await res.json();
                
                if (!data.logs) return;
                
                const logs = data.logs || [];
                
                // Calculate stats
                const totalBookings = logs.filter(l => l.type === 'BOOKING_ATTEMPT').length;
                const successfulBookings = logs.filter(l => l.type === 'BOOKING_SUCCESS').length;
                const failedBookings = logs.filter(l => l.type === 'BOOKING_ERROR').length;
                const apiCalls = logs.filter(l => l.type === 'API_CALL').length;
                
                document.getElementById('total-bookings').textContent = totalBookings;
                document.getElementById('successful-bookings').textContent = successfulBookings;
                document.getElementById('failed-bookings').textContent = failedBookings;
                document.getElementById('api-calls').textContent = apiCalls;
                
                // Recent events
                const recent = logs.slice(0, 10);
                const eventsHTML = recent.length ? recent.map(log => `
                    <div class="list-item">
                        <div>
                            <strong>${log.type}</strong><br>
                            <small style="color: #999;">${new Date(log.timestamp).toLocaleString()}</small>
                        </div>
                        <span class="badge badge-${log.status.toLowerCase()}">
                            ${log.status}
                        </span>
                    </div>
                `).join('') : '<div class="empty">No events yet</div>';
                
                document.getElementById('recent-events').innerHTML = eventsHTML;
                
                // Daily stats
                const byType = {};
                logs.forEach(log => {
                    byType[log.type] = (byType[log.type] || 0) + 1;
                });
                
                const statsHTML = Object.entries(byType).map(([type, count]) => `
                    <div class="list-item">
                        <div>${type}</div>
                        <strong style="color: #667eea;">${count}</strong>
                    </div>
                `).join('');
                
                document.getElementById('daily-stats').innerHTML = statsHTML || '<div class="empty">No data</div>';
                
            } catch (err) {
                console.error('Failed to load data:', err);
            }
        }
        
        function refreshData() {
            loadData();
        }
        
        // Load on page load
        loadData();
        
        // Auto-refresh every 30 seconds
        setInterval(loadData, 30000);
    </script>
</body>
</html>
